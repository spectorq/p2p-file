<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropShare | Минималистичная передача данных</title>
    <!-- Подключаем шрифт, похожий на Google Sans / Gotham -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Подключаем библиотеку для P2P соединений -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --border-color: #333333;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
            --accent-hover: #cccccc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.3s;
            font-weight: 500;
        }
        .tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        /* Forms & Inputs */
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 14px;
            background-color: #121212;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            border-color: #666;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* File Dropzone */
        .dropzone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background-color: #121212;
            margin-bottom: 20px;
        }
        .dropzone:hover {
            border-color: #555;
            background-color: #161616;
        }
        .dropzone input[type="file"] {
            display: none;
        }
        .dropzone svg {
            width: 40px;
            height: 40px;
            fill: var(--text-muted);
            margin-bottom: 10px;
        }
        .file-list {
            margin-top: 15px;
            font-size: 13px;
            color: var(--text-muted);
            max-height: 120px;
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #222;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
        }
        .btn:hover {
            background-color: var(--accent-hover);
        }
        .btn:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }

        /* Status & Results */
        .status-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #121212;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
            word-break: break-all;
        }
        .status-text { margin-bottom: 10px; font-weight: 500; }
        .copy-link {
            color: #fff;
            text-decoration: underline;
            cursor: pointer;
            font-size: 13px;
        }

        /* Receiver UI */
        .received-text-box {
            background-color: #121212;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            display: none;
            white-space: pre-wrap;
            font-size: 14px;
        }
        .received-file {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #121212;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }
        .received-file span {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }
        .download-btn {
            background-color: #333;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: 0.3s;
        }
        .download-btn:hover { background-color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>DropShare</h1>

    <div class="tabs">
        <div class="tab active" id="tab-btn-send" onclick="switchTab('send')">Отправить</div>
        <div class="tab" id="tab-btn-receive" onclick="switchTab('receive')">Получить</div>
    </div>

    <!-- Вкладка ОТПРАВИТЬ -->
    <div id="view-send">
        <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
            <svg viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
            </svg>
            <div style="font-size: 14px; color: #fff; font-weight: 500;">Выберите файлы (до 250)</div>
            <div style="font-size: 12px; margin-top: 5px;">или перетащите их сюда</div>
            <input type="file" id="file-input" multiple>
        </div>
        <div class="file-list" id="file-list-preview"></div>

        <div class="form-group">
            <textarea id="sender-text" placeholder="Добавьте текст или заметку (необязательно)..."></textarea>
        </div>
        <div class="form-group">
            <input type="password" id="sender-password" placeholder="Задать пароль (необязательно)">
        </div>

        <button class="btn" id="btn-start-share">Создать ссылку / Поделиться</button>

        <div class="status-box" id="sender-status-box">
            <div class="status-text" id="sender-status-text">Создание P2P подключения...</div>
            <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px;">
                Поделитесь этой ссылкой или ID с получателем:
            </div>
            <input type="text" id="share-link" readonly onclick="this.select()" style="margin-bottom: 10px; font-size: 12px;">
            <div class="copy-link" onclick="copyLink()">Скопировать ссылку</div>
        </div>
    </div>

    <!-- Вкладка ПОЛУЧИТЬ -->
    <div id="view-receive" style="display: none;">
        <div id="receive-connect-ui">
            <div class="form-group">
                <label>ID отправителя или ссылка</label>
                <input type="text" id="receiver-id" placeholder="Например: a1b2c3d4e5">
            </div>
            <button class="btn" id="btn-connect">Подключиться</button>
        </div>

        <div class="status-box" id="receiver-status-box" style="display: none; margin-top: 0;">
            <div class="status-text" id="receiver-status-text">Подключение...</div>
        </div>

        <div id="received-content" style="display: none; margin-top: 20px;">
            <div class="received-text-box" id="received-text"></div>
            <div id="received-files-list"></div>
        </div>
    </div>
</div>

<script>
    // Инициализация переменных
    let peer = null;
    let activeConnection = null;
    let selectedFiles =[];
    const MAX_FILES = 250;

    // UI Элементы
    const tabSend = document.getElementById('view-send');
    const tabReceive = document.getElementById('view-receive');
    const btnTabSend = document.getElementById('tab-btn-send');
    const btnTabReceive = document.getElementById('tab-btn-receive');
    
    // Переключение вкладок
    function switchTab(tab) {
        if (tab === 'send') {
            tabSend.style.display = 'block';
            tabReceive.style.display = 'none';
            btnTabSend.classList.add('active');
            btnTabReceive.classList.remove('active');
        } else {
            tabSend.style.display = 'none';
            tabReceive.style.display = 'block';
            btnTabReceive.classList.add('active');
            btnTabSend.classList.remove('active');
        }
    }

    // Чтение параметров URL для автоматического приема
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const receiveId = urlParams.get('id');
        if (receiveId) {
            switchTab('receive');
            document.getElementById('receiver-id').value = receiveId;
            startReceiving(receiveId);
        }
    };

    // --- ЛОГИКА ОТПРАВИТЕЛЯ ---

    // Обработка выбора файлов
    document.getElementById('file-input').addEventListener('change', (e) => {
        let files = Array.from(e.target.files);
        if (files.length > MAX_FILES) {
            alert(`Установлен лимит: не более ${MAX_FILES} файлов за раз.`);
            files = files.slice(0, MAX_FILES);
        }
        selectedFiles = files;
        
        const preview = document.getElementById('file-list-preview');
        preview.innerHTML = '';
        selectedFiles.forEach(file => {
            const size = (file.size / 1024 / 1024).toFixed(2);
            preview.innerHTML += `<div class="file-item"><span>${file.name}</span><span>${size} MB</span></div>`;
        });
    });

    // Обработка Drag & Drop
    const dropzone = document.getElementById('dropzone');
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.borderColor = '#fff'; });
    dropzone.addEventListener('dragleave', () => { dropzone.style.borderColor = 'var(--border-color)'; });
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.style.borderColor = 'var(--border-color)';
        document.getElementById('file-input').files = e.dataTransfer.files;
        document.getElementById('file-input').dispatchEvent(new Event('change'));
    });

    document.getElementById('btn-start-share').addEventListener('click', () => {
        const statusBox = document.getElementById('sender-status-box');
        statusBox.style.display = 'block';
        
        if (!peer) {
            peer = new Peer(); // Подключение к бесплатному сигнальному серверу PeerJS
            
            peer.on('open', (id) => {
                const isLocal = window.location.protocol === 'file:';
                const link = isLocal ? `ID для ввода: ${id}` : `${window.location.href.split('?')[0]}?id=${id}`;
                document.getElementById('share-link').value = isLocal ? id : link;
                document.getElementById('sender-status-text').innerText = 'Ожидание получателя...';
            });

            peer.on('connection', (conn) => {
                activeConnection = conn;
                document.getElementById('sender-status-text').innerText = 'Получатель подключен! Авторизация...';
                handleSenderConnection(conn);
            });
        }
    });

    function handleSenderConnection(conn) {
        const password = document.getElementById('sender-password').value;

        conn.on('data', async (data) => {
            if (data.type === 'hello') {
                if (password) {
                    conn.send({ type: 'auth_request' });
                } else {
                    conn.send({ type: 'auth_success' });
                    sendAllData(conn);
                }
            } else if (data.type === 'auth_attempt') {
                if (data.password === password) {
                    conn.send({ type: 'auth_success' });
                    sendAllData(conn);
                } else {
                    conn.send({ type: 'auth_fail' });
                }
            }
        });
    }

    async function sendAllData(conn) {
        document.getElementById('sender-status-text').innerText = 'Отправка данных (не закрывайте вкладку)...';
        const textMessage = document.getElementById('sender-text').value;

        // Отправка текста и метаданных
        conn.send({
            type: 'metadata',
            text: textMessage,
            fileCount: selectedFiles.length
        });

        // Отправка файлов напрямую (как ArrayBuffer, сохраняя исходные байты)
        for (let file of selectedFiles) {
            const arrayBuffer = await file.arrayBuffer();
            conn.send({
                type: 'file',
                name: file.name,
                filetype: file.type,
                data: arrayBuffer
            });
        }
        
        document.getElementById('sender-status-text').innerText = 'Успешно! Все данные переданы.';
        conn.send({ type: 'done' });
    }

    function copyLink() {
        const input = document.getElementById('share-link');
        input.select();
        document.execCommand('copy');
        alert('Скопировано в буфер обмена!');
    }


    // --- ЛОГИКА ПОЛУЧАТЕЛЯ ---

    document.getElementById('btn-connect').addEventListener('click', () => {
        let inputId = document.getElementById('receiver-id').value.trim();
        // Если вставили полную ссылку, достаем ID
        if (inputId.includes('?id=')) {
            inputId = inputId.split('?id=')[1];
        }
        if (inputId) startReceiving(inputId);
    });

    function startReceiving(hostId) {
        document.getElementById('receive-connect-ui').style.display = 'none';
        const statusBox = document.getElementById('receiver-status-box');
        statusBox.style.display = 'block';
        document.getElementById('receiver-status-text').innerText = 'Подключение к отправителю...';

        if (!peer) peer = new Peer();

        peer.on('open', () => {
            const conn = peer.connect(hostId, { reliable: true });
            activeConnection = conn;

            conn.on('open', () => {
                conn.send({ type: 'hello' });
            });

            conn.on('data', (data) => {
                if (data.type === 'auth_request') {
                    const pass = prompt('Файлы защищены паролем. Введите пароль:');
                    conn.send({ type: 'auth_attempt', password: pass });
                } 
                else if (data.type === 'auth_fail') {
                    alert('Неверный пароль!');
                    const pass = prompt('Повторите пароль:');
                    conn.send({ type: 'auth_attempt', password: pass });
                } 
                else if (data.type === 'auth_success') {
                    document.getElementById('receiver-status-text').innerText = 'Получение данных...';
                    document.getElementById('received-content').style.display = 'block';
                } 
                else if (data.type === 'metadata') {
                    if (data.text) {
                        const textBox = document.getElementById('received-text');
                        textBox.style.display = 'block';
                        textBox.innerText = data.text;
                    }
                } 
                else if (data.type === 'file') {
                    // Создаем Blob из чистых байтов (ArrayBuffer) для 100% сохранения формата/прозрачности
                    const blob = new Blob([data.data], { type: data.filetype });
                    const url = window.URL.createObjectURL(blob);
                    
                    const list = document.getElementById('received-files-list');
                    list.innerHTML += `
                        <div class="received-file">
                            <span>${data.name}</span>
                            <a href="${url}" download="${data.name}" class="download-btn">Скачать</a>
                        </div>
                    `;
                }
                else if (data.type === 'done') {
                    document.getElementById('receiver-status-text').innerText = 'Все данные получены!';
                }
            });

            conn.on('error', (err) => {
                document.getElementById('receiver-status-text').innerText = 'Ошибка соединения.';
            });
        });
    }
</script>

</body>
</html>
